<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeScript AI | Logging Out...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center">
    <div class="text-center">
        <div class="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
        <h2 class="text-white font-black text-xl">Signing you out securely...</h2>
        <p class="text-slate-400 font-semibold mt-2 text-sm">Clearing session data</p>
    </div>
    <script>
        // Clear session and redirect to login
        localStorage.removeItem('safescript_user');
        setTimeout(() => { window.location.href = 'login.html'; }, 1500);
    </script>
</body>
</html>
